<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rewards USDT Admin Panel</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>🔥 Rewards Admin Panel</h1>

<button id="connectBtn" class="btn primary">Connect Wallet</button>

<p id="wallet">Not Connected</p>
<p id="status"></p>

<!-- MENU -->
<div class="menu">
<button onclick="showSection('info')">📊 Info</button>
<button onclick="showSection('reward')">💰 Rewards</button>
<button onclick="showSection('price')">⚙️ Price</button>
</div>

<!-- INFO -->
<div id="info" class="section active">

<div class="grid">

<div class="card">TRC Balance <span id="contractBalance">0</span></div>

<div class="card">Reward TRC <span id="rewardTRC">0</span></div>
<div class="card">Reward USDT <span id="rewardUSDT">0</span></div>

<div class="card">Tax TRC <span id="taxTRC">0</span></div>
<div class="card">Tax USDT <span id="taxUSDT">0</span></div>

<div class="card">TRC Price <span id="trcPrice">0</span></div>

</div>

<div class="chartBox">
<canvas id="chart"></canvas>
</div>

</div>

<!-- REWARDS -->
<div id="reward" class="section">

<div class="box">

<h3>💰 Deposit</h3>

<input id="depositAmount" placeholder="TRC Amount">
<button id="depositBtn" class="btn">Deposit TRC</button>

<input id="depositUSDTAmount" placeholder="USDT Amount">
<button id="depositUSDTBtn" class="btn">Deposit USDT</button>

<hr>

<h3>💸 Withdraw Rewards</h3>

<input id="withdrawRewardAmount" placeholder="Amount">

<button id="withdrawRewardBtn" class="btn">Withdraw TRC</button>
<button id="withdrawRewardUSDTBtn" class="btn">Withdraw USDT</button>

<hr>

<h3>🧾 Tax Withdraw</h3>

<button id="withdrawTaxBtn" class="btn danger">TRC Tax</button>
<button id="withdrawTaxUSDTBtn" class="btn danger">USDT Tax</button>

</div>

</div>

<!-- PRICE -->
<div id="price" class="section">

<div class="box">

<h3>⚙️ Price Control</h3>

<button id="setIcoBtn" class="btn">ICO</button>
<button id="setEmaBtn" class="btn">EMA</button>

<input id="manualPrice" placeholder="Manual Price">
<button id="setManualBtn" class="btn">Manual</button>

<input id="dexAddress" placeholder="DEX Pair">
<button id="setDexBtn" class="btn">DEX</button>

<hr>

<button id="initEmaBtn" class="btn">Init EMA</button>
<button id="updateEmaBtn" class="btn">Update EMA</button>

<hr>

<h3>🔴 Fallback ICO</h3>

<input id="fallbackAddress" placeholder="Fallback ICO Address">

<button id="setFallbackBtn" class="btn">Set Fallback</button>
<button id="useFallbackBtn" class="btn">Use Fallback</button>

</div>

</div>

</div>

<script>
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}
</script>

<script src="app.js"></script>

</body>
</html>
